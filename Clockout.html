<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clockout Page</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
        }

        .clockout-card {
            max-width: 400px;
            width: 100%;
            border-radius: 15px;
        }
    </style>

</head>
<body>

<div class="container h-100">
    <div class="row h-100 justify-content-center align-items-center">
        <div class="col-md-5">
            <div class="card shadow clockout-card">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">Registro de Salida</h2>

                    <form>
                        <div class="mb-3">
                            <label for="text" class="form-label">Empleado</label>
                            <input
                                type="text"
                                class="form-control"
                                id="employee"
                                placeholder="Ingresar Nombre"
                                required>
                        </div>
                        <div class="mb-3">

                          <label for="password" class="form-label">Hora de Salida</label>
                          <input
                              type="time"
                              class="form-control"
                              id="entryTime"
                              placeholder="09:00:10">

                        </div>

                        <button type="submit" class="btn btn-primary w-100">
                            Clock In
                        </button>

                        <div class="text-center mt-3">
                            <a href="#">Registrar Empleado</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<!-- Bootstrap JS -->


</body>
</html>
