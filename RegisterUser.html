<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario</title>

    <!-- Bootstrap 5 CSS -->

    <link href="./vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="./src/styles.css">

</head>
<body>

<nav class="navbar bg-custom navbar-expand-lg sticky-top navbar-light   justify-content-center ">
e <div class="collapse navbar-collapse justify-content-center " id="navbarNav">

    <a class="navbar-brand" href="#">
      <img src="./img/logo.png" alt="FV" style="width:80px;" class="rounded-pill"> 
    </a>

    <ul class="navbar-nav ">
      <li class="nav-item bg-custom ">
        <a class="nav-link" href="./Login.html">Login</a>
      </li>
      <li class="nav-item bg-custom " id="clockin-li">
        <a class="nav-link " id="clockin-a" href="./Clockin.html">Registrar Entrada</a>
      </li>
      <li class="nav-item bg-custom  " id = "clockout-li">
        <a class="nav-link " id="clockout-a" href="./Clockout.html">Registrar Salida</a>
      </li>
      <li class="nav-item bg-custom"  id="register_user_li">
        <a class="nav-link " id="register_user_a" href="./RegisterUser.html">Nuevo Empleado</a>
      </li>

      <li class="nav-item bg-custom " id="payroll_li">
        <a class="nav-link " id="payroll_a" href="./Payroll.html">Nominas</a>
      </li>

    </ul>
  </div>
</nav>

<section class="h-100" >

  <div class="row h-100 justify-content-center align-items-center">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-lg-8 col-xl-6">
        <div class="card shadow register-user-card">

          <div class="card-body p-4 p-md-5">
            <h3 class="mb-4 pb-2 pb-md-0 mb-md-5 px-md-2">Registrar Nuevo Empleado</h3>

            <form  id="register-form" >
              <div data-mdb-input-init class="form-outline mb-4">
                <label class="form-label" for="full_name">Nombre Completo</label>
                <input type="text" id="full_name" class="form-control" required />
              </div>

              <div class="row">
                <div class="col-md-6 mb-4">

                  <div data-mdb-input-init class="form-outline datepicker">
                    <label for="birthday" class="form-label">Fecha de nacimiento</label>
                    <input
                        type="date"
                        class="form-control"
                        id="birthday"
                        placeholder="09:00:10"
                        required>
                  </div>

                </div>

                <div class="col-md-6 mb-4" id="options-maquila">

                  <label for="options-maquila-init" class="form-label">Tipo de Maquila</label>
                  <select id="id_maquila" required>
                    <option value="1" disabled>MaquilaA</option>
                    <option value="2">MaquilaB</option>
                  </select>

                </div>

              </div>


              <button type="submit" class="btn btn-primary w-100 bg-custom">
                  Registrar Empleado
              </button>

            </form>

          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<script src="./vendor/bootstrap/js/bootstrap.min.js" ></script>
<script src="src/registeruser.js" type="module"></script>
</body>
</html>
