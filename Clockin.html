<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clockin Page</title>

    <!-- Bootstrap 5 CSS -->
    <link href="./vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./src/styles.css">

</head>
<body>

<nav class="navbar bg-custom navbar-expand-lg sticky-top navbar-light   justify-content-center ">
  <div class="collapse navbar-collapse justify-content-center " id="navbarNav">

    <a class="navbar-brand" href="#">
      <img src="./img/logo.png" alt="FV" style="width:80px;" class="rounded-pill"> 
    </a>

    <ul class="navbar-nav ">
      <li class="nav-item bg-custom ">
        <a class="nav-link" href="./Login.html">Iniciar sesion</a>
      </li>
      <li class="nav-item bg-custom " id="clockin-li">
        <a class="nav-link " id="clockin-a" href="./Clockin.html">Registrar Entrada</a>
      </li>
      <li class="nav-item bg-custom  " id = "clockout-li">
        <a class="nav-link " id="clockout-a" href="./Clockout.html">Registrar Salida</a>
      </li>
      <li class="nav-item bg-custom"  id="register_user_li">
        <a class="nav-link " id="register_user_a" href="./RegisterUser.html">Nuevo Empleado</a>
      </li>

      <li class="nav-item bg-custom " id="payroll_li">
        <a class="nav-link " id="payroll_a" href="./Payroll.html">Nominas</a>
      </li>

    </ul>
  </div>
</nav>

<div class="container h-100">
    <div class="row h-100 justify-content-center align-items-center">
        <div class="col-md-5">
            <div class="card shadow clockin-card">
                <div class="card-body p-4">
                    <h2 class="text-center mb-4">
                      Registro de Entrada
                    </h2>

                    <form id="clockin-form">
                        <div class="mb-3">
                            <label for="text" class="form-label">Empleado</label>
                            <input
                                type="text"
                                class="form-control"
                                id="employee"
                                placeholder="Ingresar Nombre"
                                required>
                        </div>
                        <div class="mb-3">

                          <label for="password" class="form-label">Hora de Entrada</label>
                          <input
                              type="time"
                              class="form-control"
                              id="entryTime"
                              placeholder="09:00:10"
                          required>

                        </div>

                        <button type="submit" class="btn btn-primary w-100 bg-custom">
                            Registrar
                        </button>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS -->

<script src="./vendor/bootstrap/js/bootstrap.min.js" ></script>
  <script src="src/clockin.js" type="module"></script>

</body>
</html>
